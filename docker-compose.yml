services:
  prosperity-dashboard:
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      MAX_UPLOAD_MB: "25"
      # Set this before exposing the app outside localhost:
      # DASHBOARD_PASSWORD: "change-me"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
